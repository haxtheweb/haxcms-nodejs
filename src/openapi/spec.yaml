
openapi: 3.0.0
info:
  title: 'HAXcms API'
  description: 'API for interfacing with HAXcms end points'
  termsOfService: 'https://haxtheweb.org'
  contact:
    email: hax@psu.edu
  license:
    name: 'Apache 2.0'
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
  version: 
servers:
paths:
  /options:
    post:
      tags:
        - api
      operationId: 'Operations::options'
      responses:
        '200':
          description: 'API bandaid till we get all the APIs documented. This is an array of callbacks'
  /:
    post:
      tags:
        - api
      summary: 'Generate the swagger API documentation for this site'
      operationId: 'Operations::api'
      responses:
        '200':
          description: 'API documentation in YAML'
  /openapi:
    get:
      tags:
        - api
      summary: 'Generate the swagger API documentation for this site'
      operationId: 'Operations::openapi'
      responses:
        '200':
          description: 'API documentation in YAML'
  /openapi/json:
    get:
      tags:
        - api
      summary: 'Generate the swagger API documentation for this site'
      operationId: 'Operations::openapi'
      responses:
        '200':
          description: 'API documentation in JSON'
    post:
      tags:
        - api
      summary: 'Generate the swagger API documentation for this site'
      operationId: 'Operations::openapi'
      responses:
        '200':
          description: 'API documentation in JSON'
  /getNodeRevisions:
    post:
      tags:
        - cms
        - authenticated
        - node
        - git
      operationId: 'Operations::getNodeRevisions'
      parameters:
        -
          name: site_token
          in: query
          description: 'Site-specific validation token'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - site
                - node
              properties:
                site:
                  type: object
                  properties:
                    name:
                      type: string
                node:
                  type: object
                  properties:
                    id:
                      type: string
                limit:
                  type: integer
                  description: 'Optional max revisions to return (default 25)'
                offset:
                  type: integer
                  description: 'Optional zero-based offset into revision history (default 0)'
              type: object
      responses:
        '200':
          description: 'List git revisions for a single node file'
  /getNodeRevision:
    post:
      tags:
        - cms
        - authenticated
        - node
        - git
      operationId: 'Operations::getNodeRevision'
      parameters:
        -
          name: site_token
          in: query
          description: 'Site-specific validation token'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - site
                - node
                - hash
              properties:
                site:
                  type: object
                  properties:
                    name:
                      type: string
                node:
                  type: object
                  properties:
                    id:
                      type: string
                hash:
                  type: string
                  description: 'Commit hash for the requested page revision'
              type: object
      responses:
        '200':
          description: 'Load the HTML content snapshot for a specific node revision hash'
  /restoreNodeRevision:
    post:
      tags:
        - cms
        - authenticated
        - node
        - git
      operationId: 'Operations::restoreNodeRevision'
      parameters:
        -
          name: site_token
          in: query
          description: 'Site-specific validation token'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - site
                - node
                - hash
              properties:
                site:
                  type: object
                  properties:
                    name:
                      type: string
                node:
                  type: object
                  properties:
                    id:
                      type: string
                hash:
                  type: string
                  description: 'Commit hash to restore content from'
              type: object
      responses:
        '200':
          description: 'Restore a node revision by writing historical content as a new commit'
  /siteUpdateAlternateFormats:
    post:
      tags:
        - cms
        - authenticated
        - meta
      operationId: 'Operations::siteUpdateAlternateFormats'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - site
              properties:
                site:
                  type: object
                format:
                  type: string
              type: object
      responses:
        '200':
          description: 'Update the alternative formats surrounding a site'
  /connectionSettings:
    get:
      tags:
        - cms
      operationId: 'Operations::connectionSettings'
      responses:
        '200':
          description: 'Generate the connection settings dynamically for implying we have a PHP backend'
    post:
      tags:
        - cms
      operationId: 'Operations::connectionSettings'
      responses:
        '200':
          description: 'Generate the connection settings dynamically for implying we have a PHP backend'
  /generateAppStore:
    get:
      tags:
        - hax
        - api
      operationId: 'Operations::generateAppStore'
      parameters:
        -
          name: appstore_token
          in: query
          description: 'security token for appstore'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'Generate the AppStore spec for HAX editor directions'
  /getUserData:
    post:
      tags:
        - cms
        - authenticated
        - user
        - settings
      operationId: 'Operations::getUserData'
      parameters:
        -
          name: user_token
          in: query
          description: 'User validation token'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'Load data about the logged in user'
  /formLoad:
    post:
      tags:
        - cms
        - authenticated
        - form
      operationId: 'Operations::formLoad'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - token
                - haxcms_form_id
              properties:
                token:
                  type: string
                haxcms_form_id:
                  type: string
                site:
                  type: object
                node:
                  type: object
              type: object
      responses:
        '200':
          description: 'Load a form based on ID'
  /formProcess:
    post:
      tags:
        - cms
        - authenticated
        - form
      operationId: 'Operations::formProcess'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - haxcms_form_id
                - haxcms_form_token
              properties:
                haxcms_form_id:
                  type: string
                haxcms_form_token:
                  type: string
                site:
                  type: object
                node:
                  type: object
              type: object
      responses:
        '200':
          description: 'Process a form based on ID and input data'
  /listFiles:
    get:
      tags:
        - hax
        - authenticated
        - file
      operationId: 'Operations::listFiles'
      parameters:
        -
          name: site_token
          in: query
          description: 'Site-specific validation token'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'Load existing files for presentation in HAX find area'
  /login:
    post:
      tags:
        - cms
        - user
      description: 'Attempt a user login'
      operationId: 'Operations::login'
      requestBody:
        content:
          application/json:
            schema:
              properties:
                username:
                  type: string
                password:
                  type: string
                jwt:
                  type: string
              type: object
              example:
                username: admin
                password: admin
      responses:
        '200':
          description: 'JWT token as response'
        '403':
          description: 'Invalid token / Login is required'
  /logout:
    post:
      tags:
        - cms
        - user
      operationId: 'Operations::logout'
      responses:
        '200':
          description: 'User logout, front end will kill token'
    get:
      tags:
        - cms
        - user
      operationId: 'Operations::logout'
      responses:
        '200':
          description: 'User logout, front end will kill token'
  /refreshAccessToken:
    post:
      tags:
        - cms
        - user
      operationId: 'Operations::refreshAccessToken'
      responses:
        '200':
          description: 'User access token for refreshing JWT when it goes stale'
    get:
      tags:
        - cms
        - user
      operationId: 'Operations::refreshAccessToken'
      responses:
        '200':
          description: 'User access token for refreshing JWT when it goes stale'
  /saveFile:
    post:
      tags:
        - hax
        - authenticated
        - file
      operationId: 'Operations::saveFile'
      parameters:
        -
          name: site_token
          in: query
          description: 'Site-specific validation token'
          required: true
          schema:
            type: string
        -
          name: siteName
          in: query
          description: 'Name of the site to upload the file to'
          required: true
          schema:
            type: string
        -
          name: nodeId
          in: query
          description: 'ID of the node/page to associate the file with'
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
                - file-upload
              properties:
                file-upload:
                  type: string
                  format: binary
                  description: 'File to upload'
              type: object
      responses:
        '200':
          description: 'User is uploading a file to present in a site'
        '500':
          description: 'Error uploading file'
  /skeletonsList:
    get:
      tags:
        - cms
      operationId: 'Operations::skeletonsList'
      parameters:
        -
          name: user_token
          in: query
          description: 'User validation token'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'List available site skeletons'
    post:
      tags:
        - cms
      operationId: 'Operations::skeletonsList'
      parameters:
        -
          name: user_token
          in: query
          description: 'User validation token'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'List available site skeletons'
  /getSkeleton:
    get:
      tags:
        - cms
      operationId: 'Operations::getSkeleton'
      parameters:
        -
          name: user_token
          in: query
          description: 'User validation token'
          required: true
          schema:
            type: string
        -
          name: name
          in: query
          description: 'Skeleton file name (without .json extension)'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'Returns skeleton JSON data'
    post:
      tags:
        - cms
      operationId: 'Operations::getSkeleton'
      parameters:
        -
          name: user_token
          in: query
          description: 'User validation token'
          required: true
          schema:
            type: string
        -
          name: name
          in: query
          description: 'Skeleton file name (without .json extension)'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'Returns skeleton JSON data'
  /listSites:
    get:
      tags:
        - cms
      operationId: 'Operations::listSites'
      responses:
        '200':
          description: 'Load a list of all sites the user has created'
    post:
      tags:
        - cms
      operationId: 'Operations::listSites'
      responses:
        '200':
          description: 'Load a list of all sites the user has created'
  /cloneSite:
    post:
      tags:
        - cms
        - authenticated
        - site
      operationId: 'Operations::cloneSite'
      parameters:
        -
          name: user_token
          in: query
          description: 'User validation token'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - site
              properties:
                site:
                  type: object
              type: object
              example:
                site:
                  name: mynewsite
      responses:
        '200':
          description: 'Clone a site by copying and renaming the folder on file system'
  /downloadSite:
    post:
      tags:
        - cms
        - authenticated
        - site
        - meta
      operationId: 'Operations::downloadSite'
      parameters:
        -
          name: user_token
          in: query
          description: 'User validation token'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - site
              properties:
                site:
                  type: object
              type: object
              example:
                site:
                  name: mynewsite
      responses:
        '200':
          description: 'Download the site folder as a zip file'
  /archiveSite:
    post:
      tags:
        - cms
        - authenticated
        - site
      operationId: 'Operations::archiveSite'
      parameters:
        -
          name: user_token
          in: query
          description: 'User validation token'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - site
              properties:
                site:
                  type: object
              type: object
              example:
                site:
                  name: mynewsite
      responses:
        '200':
          description: 'Archive a site by moving it on the file system'
  /createSite:
    post:
      tags:
        - cms
        - authenticated
        - site
      operationId: 'Operations::createSite'
      parameters:
        -
          name: user_token
          in: query
          description: 'User validation token'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - site
                - token
              properties:
                site:
                  type: object
                  properties:
                    name:
                      type: string
                    domain:
                      type: string
                    description:
                      type: string
                    theme:
                      type: string
                build:
                  type: object
                  properties:
                    structure:
                      type: string
                    type:
                      type: string
                    items:
                      type: array
                    files:
                      type: object
                token:
                  type: string
              type: object
              example:
                site:
                  name: mynewsite
                  domain: ''
                  description: 'My new site description'
                  theme: learn-two-theme
                build:
                  type: course
                  structure: docx import
                token: request-token
      responses:
        '200':
          description: 'Create a new site'
  /saveNodeDetails:
    post:
      tags:
        - cms
        - authenticated
        - node
      operationId: 'Operations::saveNodeDetails'
      parameters:
        -
          name: site_token
          in: query
          description: 'Site-specific validation token'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - site
                - node
              properties:
                site:
                  type: object
                node:
                  type: object
              type: object
      responses:
        '200':
          description: 'Perform a singular node operation'
tags:
  -
    name: hax
    description: 'Operations required for HAX editor to work'
    externalDocs:
      description: 'Find out more about hax editor integrations'
      url: 'https://haxtheweb.org/integrations/create-new-ones'
  -
    name: cms
    description: 'Operations for the CMS side'
  -
    name: site
    description: 'Operations for sites'
  -
    name: node
    description: 'Operations for individual nodes in a site'
  -
    name: file
    description: 'Operations for files related to CMS or HAX'
  -
    name: form
    description: 'Operations related to form submission or generation'
  -
    name: meta
    description: 'Operations related to metadata management or processes'
  -
    name: git
    description: 'Operations related to git / version control of the site'
  -
    name: user
    description: 'Operations for the user account / object'
  -
    name: api
    description: 'endpoint to generate the API or surrounding API callbacks'
  -
    name: settings
    description: 'Internal settings related to configuration of this HAXcms deployment'
  -
    name: authenticated
    description: 'Operations requiring authentication'
externalDocs:
  description: 'HAXcms and all things HAX documentations'
  url: 'https://haxtheweb.org/'
