openapi: 3.0.3
info:
  title: HAXcms System API
  description: Control-plane API for authentication, lifecycle/admin, discovery/meta, and system settings/configuration.
  version: 0.0.0
servers:
  - url: /
    description: System API base path
tags:
  - name: discovery
  - name: session
  - name: lifecycle
  - name: settings
paths:
  /system/api/v1:
    get:
      tags:
        - discovery
      operationId: systemApiDiscovery
      summary: Discover top-level system API links and capabilities
      security: []
      responses:
        "200":
          description: Discovery metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
  /system/api/v1/openapi:
    get:
      tags:
        - discovery
      operationId: systemOpenapi
      summary: Return the system OpenAPI document (JSON default, YAML supported)
      security: []
      responses:
        "200":
          description: OpenAPI document
          content:
            application/json:
              schema:
                type: object
            application/yaml:
              schema:
                type: string
  /system/api/v1/openapi.json:
    get:
      tags:
        - discovery
      operationId: systemOpenapiJson
      summary: Return the system OpenAPI document as JSON
      security: []
      responses:
        "200":
          description: OpenAPI JSON document
          content:
            application/json:
              schema:
                type: object
  /system/api/v1/openapi.yaml:
    get:
      tags:
        - discovery
      operationId: systemOpenapiYaml
      summary: Return the system OpenAPI document as YAML
      security: []
      responses:
        "200":
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
  /system/api/v1/session/login:
    post:
      tags:
        - session
      operationId: sessionLogin
      summary: Authenticate a user and establish a dashboard session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /system/api/v1/session:
    get:
      tags:
        - session
      operationId: sessionAuthGet
      summary: Validate a JWT and return authenticated session details
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - session
      operationId: sessionAuthPost
      summary: Validate a JWT and return authenticated session details
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                jwt:
                  type: string
      responses:
        "200":
          description: Authenticated session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/session/logout:
    post:
      tags:
        - session
      operationId: sessionLogout
      summary: Log out the active dashboard session
      security: []
      responses:
        "200":
          description: Logout response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
  /system/api/v1/session/refresh:
    get:
      tags:
        - session
      operationId: sessionRefreshGet
      summary: Refresh dashboard access token
      security: []
      responses:
        "200":
          description: Refresh response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - session
      operationId: sessionRefreshPost
      summary: Refresh dashboard access token
      security: []
      responses:
        "200":
          description: Refresh response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /system/api/v1/session/user:
    get:
      tags:
        - session
      operationId: sessionUserGet
      summary: Return active user profile and dashboard preference data
      security:
        - bearerAuth: []
          userTokenHeader: []
      responses:
        "200":
          description: Active user profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - session
      operationId: sessionUserPost
      summary: Return active user profile and dashboard preference data
      security:
        - bearerAuth: []
          userTokenHeader: []
      responses:
        "200":
          description: Active user profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/session/connection-settings:
    get:
      tags:
        - session
      operationId: sessionConnectionSettingsGet
      summary: Return frontend connection settings bootstrap payload
      security: []
      responses:
        "200":
          description: Frontend connection settings payload
          content:
            application/javascript:
              schema:
                type: string
            application/json:
              schema:
                type: object
    post:
      tags:
        - session
      operationId: sessionConnectionSettingsPost
      summary: Return frontend connection settings bootstrap payload
      security: []
      responses:
        "200":
          description: Frontend connection settings payload
          content:
            application/javascript:
              schema:
                type: string
            application/json:
              schema:
                type: object
  /system/api/v1/session/connection-test:
    get:
      tags:
        - session
      operationId: sessionConnectionTestGet
      summary: Validate current auth state for dashboard bootstrap
      security: []
      responses:
        "200":
          description: Session validity state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
    post:
      tags:
        - session
      operationId: sessionConnectionTestPost
      summary: Validate current auth state for dashboard bootstrap
      security: []
      responses:
        "200":
          description: Session validity state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
  /system/api/v1/sites:
    get:
      tags:
        - lifecycle
      operationId: listSites
      summary: List all sites available to the authenticated user
      security:
        - bearerAuth: []
          userTokenQuery: []
      responses:
        "200":
          description: Site listing payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - lifecycle
      operationId: createSite
      summary: Create a new site
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteActionRequest"
      responses:
        "200":
          description: Site creation response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/sites/{siteName}:
    parameters:
      - $ref: "#/components/parameters/SiteName"
    get:
      tags:
        - lifecycle
      operationId: siteInfoGet
      summary: Return metadata for a specific site
      security:
        - bearerAuth: []
          userTokenQuery: []
      responses:
        "200":
          description: Site metadata response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - lifecycle
      operationId: siteInfoPost
      summary: Return metadata for a specific site
      security:
        - bearerAuth: []
          userTokenQuery: []
      responses:
        "200":
          description: Site metadata response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/sites/{siteName}/clone:
    parameters:
      - $ref: "#/components/parameters/SiteName"
    post:
      tags:
        - lifecycle
      operationId: cloneSite
      summary: Clone an existing site
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteActionRequest"
      responses:
        "200":
          description: Site clone response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/sites/{siteName}/archive:
    parameters:
      - $ref: "#/components/parameters/SiteName"
    post:
      tags:
        - lifecycle
      operationId: archiveSite
      summary: Archive a site
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteActionRequest"
      responses:
        "200":
          description: Site archive response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/sites/{siteName}/download:
    parameters:
      - $ref: "#/components/parameters/SiteName"
    post:
      tags:
        - lifecycle
      operationId: downloadSite
      summary: Generate and return a downloadable site archive reference
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteActionRequest"
      responses:
        "200":
          description: Site download response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/sites/{siteName}/download-skeleton:
    parameters:
      - $ref: "#/components/parameters/SiteName"
    post:
      tags:
        - lifecycle
      operationId: downloadSiteSkeleton
      summary: Generate and return a reusable skeleton for a site
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteActionRequest"
      responses:
        "200":
          description: Site skeleton response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/sites/{siteName}/save-as-template:
    parameters:
      - $ref: "#/components/parameters/SiteName"
    post:
      tags:
        - lifecycle
      operationId: saveSiteAsTemplate
      summary: Save a site as a reusable system template
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteActionRequest"
      responses:
        "200":
          description: Save-as-template response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/system/app-store:
    get:
      tags:
        - settings
      operationId: generateAppStore
      summary: Generate app-store provider manifest for the editor
      security:
        - appStoreTokenQuery: []
          siteTokenQuery: []
      responses:
        "200":
          description: App-store payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/system/status:
    get:
      tags:
        - settings
      operationId: systemStatusGet
      summary: Return system status and environment diagnostics
      security:
        - bearerAuth: []
          userTokenQuery: []
      responses:
        "200":
          description: System status data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - settings
      operationId: systemStatusPost
      summary: Return system status and environment diagnostics
      security:
        - bearerAuth: []
          userTokenQuery: []
      responses:
        "200":
          description: System status data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/settings/api-keys:
    get:
      tags:
        - settings
      operationId: getApiKeys
      summary: Return configured API keys and provider statuses
      security:
        - bearerAuth: []
          userTokenQuery: []
      responses:
        "200":
          description: API key settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - settings
      operationId: saveApiKeysPost
      summary: Update API key settings
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeysSettings"
      responses:
        "200":
          description: API key update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags:
        - settings
      operationId: saveApiKeysPatch
      summary: Update API key settings
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeysSettings"
      responses:
        "200":
          description: API key update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/settings/media:
    get:
      tags:
        - settings
      operationId: getMediaSettings
      summary: Return media and upload configuration
      security:
        - bearerAuth: []
          userTokenQuery: []
      responses:
        "200":
          description: Media settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - settings
      operationId: saveMediaSettingsPost
      summary: Update media and upload configuration
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaSettings"
      responses:
        "200":
          description: Media settings update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags:
        - settings
      operationId: saveMediaSettingsPatch
      summary: Update media and upload configuration
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaSettings"
      responses:
        "200":
          description: Media settings update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/settings/enabled-skeletons:
    post:
      tags:
        - settings
      operationId: saveEnabledSkeletonsPost
      summary: Update enabled skeleton configuration
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledCollectionSettings"
      responses:
        "200":
          description: Enabled skeletons update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags:
        - settings
      operationId: saveEnabledSkeletonsPatch
      summary: Update enabled skeleton configuration
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledCollectionSettings"
      responses:
        "200":
          description: Enabled skeletons update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/settings/schema-files/operations:
    post:
      tags:
        - settings
      operationId: schemaFileOperation
      summary: Perform schema file operation in system configuration storage
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Schema file operation response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/settings/enabled-themes:
    post:
      tags:
        - settings
      operationId: saveEnabledThemesPost
      summary: Update enabled theme configuration
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledCollectionSettings"
      responses:
        "200":
          description: Enabled themes update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags:
        - settings
      operationId: saveEnabledThemesPatch
      summary: Update enabled theme configuration
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledCollectionSettings"
      responses:
        "200":
          description: Enabled themes update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/settings/enabled-blocks:
    post:
      tags:
        - settings
      operationId: saveEnabledBlocksPost
      summary: Update enabled block configuration
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledCollectionSettings"
      responses:
        "200":
          description: Enabled blocks update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags:
        - settings
      operationId: saveEnabledBlocksPatch
      summary: Update enabled block configuration
      security:
        - bearerAuth: []
          userTokenQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledCollectionSettings"
      responses:
        "200":
          description: Enabled blocks update response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/system/blocks:
    get:
      tags:
        - settings
      operationId: systemBlocksGet
      summary: Return available system blocks
      security:
        - bearerAuth: []
          userTokenQuery: []
      responses:
        "200":
          description: Available block list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - settings
      operationId: systemBlocksPost
      summary: Return available system blocks
      security:
        - bearerAuth: []
          userTokenQuery: []
      responses:
        "200":
          description: Available block list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/skeletons:
    get:
      tags:
        - settings
      operationId: systemSkeletonsGet
      summary: Return available system skeletons
      security:
        - bearerAuth: []
          userTokenHeader: []
      responses:
        "200":
          description: Available skeleton list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - settings
      operationId: systemSkeletonsPost
      summary: Upload a skeleton resource or perform skeleton collection operations
      security:
        - bearerAuth: []
          userTokenHeader: []
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SkeletonUploadRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/SkeletonMutationRequest"
      responses:
        "200":
          description: Skeleton resource operation response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/api/v1/skeletons/{skeletonName}:
    parameters:
      - $ref: "#/components/parameters/SkeletonName"
    get:
      tags:
        - settings
      operationId: systemSkeletonDetailGet
      summary: Return details for a named skeleton
      security:
        - bearerAuth: []
          userTokenHeader: []
      responses:
        "200":
          description: Skeleton details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags:
        - settings
      operationId: systemSkeletonDetailPatch
      summary: Rename a named skeleton
      security:
        - bearerAuth: []
          userTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkeletonRenameRequest"
      responses:
        "200":
          description: Skeleton rename response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Target skeleton name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      tags:
        - settings
      operationId: systemSkeletonDetailPut
      summary: Rename a named skeleton (compatibility alias for PATCH)
      security:
        - bearerAuth: []
          userTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkeletonRenameRequest"
      responses:
        "200":
          description: Skeleton rename response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
