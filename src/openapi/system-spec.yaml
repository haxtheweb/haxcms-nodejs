components:
  parameters:
    SiteName:
      in: path
      name: siteName
      required: true
      schema:
        type: string
      description: Machine name of the site
    SkeletonName:
      in: path
      name: skeletonName
      required: true
      schema:
        type: string
      description: Machine name of the skeleton
  responses:
    BadRequest:
      description: Request payload was invalid or incomplete
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Authentication is required or failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Authenticated user is not authorized for this route
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    userTokenQuery:
      type: apiKey
      in: query
      name: user_token
    userTokenHeader:
      type: apiKey
      in: header
      name: X-HAXCMS-User-Token
    siteTokenQuery:
      type: apiKey
      in: query
      name: site_token
    appStoreTokenQuery:
      type: apiKey
      in: query
      name: appstore_token
  schemas:
    ApiEnvelope:
      type: object
      properties:
        status:
          type: integer
        data: {}
      additionalProperties: true
    ErrorEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            message:
              type: string
    LoginRequest:
      type: object
      properties:
        u:
          type: string
          description: Username
        p:
          type: string
          description: Password
      additionalProperties: true
    SiteActionRequest:
      type: object
      properties:
        site:
          type: object
      additionalProperties: true
    ApiKeysSettings:
      type: object
      description: API key settings payload
      additionalProperties: true
    MediaSettings:
      type: object
      description: Media settings payload
      additionalProperties: true
    EnabledCollectionSettings:
      type: object
      description: Enabled item map payload
      additionalProperties: true
    SkeletonUploadRequest:
      type: object
      description: Multipart payload for uploading a new skeleton resource
      properties:
        file:
          type: string
          format: binary
          description: Skeleton JSON file upload
        name:
          type: string
          description: Optional target skeleton machine name override
        schema:
          type: string
          description: Optional schema selector (defaults to skeleton)
        action:
          type: string
          description: Optional action hint (upload)
      additionalProperties: true
    SkeletonMutationRequest:
      type: object
      description: JSON mutation payload for skeleton resource operations
      properties:
        schema:
          type: string
        action:
          type: string
        name:
          type: string
        oldName:
          type: string
        skeletonName:
          type: string
        newName:
          type: string
        displayName:
          type: string
      additionalProperties: true
    SkeletonRenameRequest:
      type: object
      description: Rename payload for skeleton resource detail mutation
      required:
        - newName
      properties:
        newName:
          type: string
        displayName:
          type: string
      additionalProperties: true
